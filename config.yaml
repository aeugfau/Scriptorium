# Default starting world for civsim.
# Run a fresh world from this file with:  python -m civsim.cli new-world config.yaml

world:
  name: 尤弥尔大陆
  seed: 0                      # 0=每次开局真随机；填任意正整数则该局可复现(同一 seed 出相同结果)
  years_per_tick: 25           # one tick = 25 in-world years
  continents: [北境, 翠原, 焦土]

civs:
  - id: norheim
    name: 诺尔海姆
    biome: coastal
    population: 800
    food: 120.0
    wealth: 40.0
    tech_level: 1            # BRONZE (int; see TechLevel enum)
    government: chiefdom
    religion: 海灵信仰
    culture_traits: [航海, 尚勇, 议事传统]
    color: cyan
    social_classes: [nobility, commoner, artisan, soldier]   # 初始已解锁核心阶层
    role_pool: [航海长, 渔会首脑, 海灵祭司]                   # 初始身份种子，后续靠 LLM 涌现扩充
    naming:
      roots: [萨尔, 诺, 伊尔, 汀, 维恩, 洛克, 费恩, 瓦尔, 斯格, 图林, 布里, 海尔姆]   # 风格示例，LLM 可发明新词并自动回收扩充
      prefixes: []
      suffixes: []
      clans: [霜鲸氏, 浪鸦氏, 锚石氏, 潮汐氏, 破浪氏, 鲸骨氏, 海风氏, 沉礁氏]
      template: "{root}·{clan}"                              # 组合模板（支持 {prefix}/{root}/{suffix}/{clan}/{ordinal}）
      style_note: 海民命名喜航海与海兽意象，常以氏族连名，音节短促有力
      gendered: false
    voice:                                                       # 官方文风（按体裁），可演化
      general: 庄重尚武，简劲如海风
      by_genre:
        chronicle: 以海象与潮汛纪年，记酋长功业与航海事，简劲尚武
        decree: 诏令以海灵名义起首，语气刚直，多涉航海与战备
        scripture: 经文多颂海灵与鲸神，语带潮汐韵律
        diary: 日记口语化，常提渔获、海况、出海见闻
        minutes: 议事纪要条目化，多议航海、分配、战备
    organizations:                              # 初始社会组织种子，后续靠 LLM 涌现扩充
      - name: 霜鲸湾
        org_type: settlement
        founded_year: 0
        status: stable
      - name: 海灵教会
        org_type: church
        founded_year: 0
        status: stable
  - id: verdia
    name: 翠地亚
    biome: plains
    population: 1200
    food: 150.0
    wealth: 60.0
    tech_level: 0            # STONE
    government: tribal
    religion: 地母崇拜
    culture_traits: [农耕, 祭祖, 制陶]
    color: green
    social_classes: [commoner, artisan, marginal]
    role_pool: [陶工, 祭祖长老, 守田人]
    naming:
      roots: [穆, 卡, 苏, 岚, 达, 禾青, 禾实, 谷梁, 田仲, 陶生, 泥根, 壤伯]
      prefixes: []
      suffixes: []
      clans: [禾氏, 陶氏, 泥氏, 壤氏, 谷氏, 井氏, 塬氏, 陇氏]
      template: "{root}·{clan}"
      style_note: 农耕民命名尚土地与谷物意象，多以职业或氏族连名，质朴平和
      gendered: false
    voice:
      general: 质朴平和，厚土气息
      by_genre:
        chronicle: 以节气与丰歉纪年，记农事、祭祖、氏族事，质朴平和
        decree: 长老令语气恳切，多涉农时、分田、祭典
        scripture: 经文颂地母与谷灵，语带泥土与生长意象
        diary: 日记口语化，常提天气、农活、收成、邻里
        minutes: 议事纪要条目化，多议农时、水源、祭祖分配
    organizations:
      - name: 禾原
        org_type: settlement
        founded_year: 0
        status: stable
      - name: 地母教会
        org_type: church
        founded_year: 0
        status: stable

# Initial diplomatic stance matrix (optional; missing pairs default to neutral).
relations:
  - [norheim, verdia, trade]

# First era label; the calendar begins here.
era:
  name: 黎明纪
  start_year: 0
  description: 诸文明于尤弥尔大陆初兴之时。